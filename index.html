<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Намсрай Авто Машин</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 2.5rem; color: #e94560; margin-bottom: 20px; }
        p { font-size: 1.2rem; color: #ccc; margin-bottom: 10px; }
        .badge {
            background: #e94560;
            padding: 10px 30px;
            border-radius: 25px;
            margin-top: 30px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <h1>🚗 Намсрай Авто Машин</h1>
    <p>Монгол улсын хууль тогтоомын дагуу</p>
    <p>эд мөнгийн хонжворт суглаа</p>
    <div class="badge">Удахгүй нээлтээ хийнэ</div>
</body>
</html>
